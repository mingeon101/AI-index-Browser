<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI Browser v5 - Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background: #020202; }
        .step-card { border-left: 2px solid #3b82f6; transition: all 0.3s; }
        .step-card:hover { background: rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="text-gray-200">
    <div class="max-w-5xl mx-auto p-6 md:p-12">
        <div class="flex justify-between items-end mb-12 border-b border-gray-800 pb-6">
            <div>
                <h1 class="text-5xl font-black text-white tracking-tighter">GEMINI <span class="text-blue-600 font-normal italic">3.1</span></h1>
                <p class="text-blue-500/60 mt-1">Autonomous Agentic Engine v5.0</p>
            </div>
            <div class="text-right text-xs text-gray-600">SYSTEM: ONLINE<br>LATENCY: 42ms</div>
        </div>

        <div class="bg-gray-900/50 p-2 rounded-2xl border border-gray-800 flex gap-2 mb-10">
            <input id="taskInput" class="flex-1 bg-transparent p-4 outline-none text-lg" placeholder="에이전트에게 내릴 명령을 입력하세요...">
            <button onclick="deployAgent()" id="runBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-10 py-4 rounded-xl font-bold transition-all shadow-lg shadow-blue-900/20">DEPLOY</button>
        </div>

        <div id="missionLog" class="grid grid-cols-1 md:grid-cols-3 gap-8 hidden">
            <div class="md:col-span-2 space-y-4">
                <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Thinking Stream</h3>
                <div id="steps" class="space-y-4"></div>
            </div>
            <div class="bg-blue-600 rounded-3xl p-8 h-fit sticky top-10 shadow-2xl shadow-blue-600/10">
                <h3 class="text-xs font-bold text-blue-200 uppercase mb-4 tracking-tighter">Mission Result</h3>
                <div id="finalAnswer" class="text-white text-xl font-medium leading-relaxed">준비 중...</div>
            </div>
        </div>
    </div>

    <script>
        async function deployAgent() {
            const task = document.getElementById('taskInput').value;
            const steps = document.getElementById('steps');
            const finalAnswer = document.getElementById('finalAnswer');
            const missionLog = document.getElementById('missionLog');
            const runBtn = document.getElementById('runBtn');

            if(!task) return;
            
            runBtn.innerText = "AGENT DEPLOYED...";
            runBtn.disabled = true;
            missionLog.classList.remove('hidden');
            steps.innerHTML = "";
            finalAnswer.innerText = "Searching & Analyzing...";

            try {
                const res = await fetch('https://ai-index-browser.onrender.com/agent/execute', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ task })
                });
                const data = await res.json();

                data.history.forEach(h => {
                    const div = document.createElement('div');
                    div.className = "step-card p-5 bg-gray-900/80 rounded-r-xl border-l-4 border-blue-600";
                    div.innerHTML = `<div class="text-xs text-gray-500 mb-1">STEP ${h.step} - ${h.action}</div><div class="text-sm">${h.thought}</div>`;
                    steps.appendChild(div);
                });

                finalAnswer.innerText = data.answer || "Mission Complete.";
            } catch (e) {
                finalAnswer.innerText = "Error in Mission: " + e.message;
            } finally {
                runBtn.innerText = "DEPLOY";
                runBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
